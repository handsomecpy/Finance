<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>给我最喜欢的你</title>
<meta name="description" content="一束会心跳的爱心花束。" />
<style>
:root{--ink:#301523;--muted:#765264;--rose:#ff5f8c;--gold:#ffcf5b;--leaf:#257f5b;--mint:#70d7b8;--sky:#dff7ff}*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:#fff7fb}main{position:relative;display:grid;min-height:100vh;min-height:100svh;overflow:hidden;place-items:center;padding:42px 18px 28px;background:radial-gradient(circle at 16% 18%,rgba(255,207,91,.34),transparent 26%),radial-gradient(circle at 82% 13%,rgba(112,215,184,.28),transparent 24%),radial-gradient(circle at 50% 108%,rgba(255,95,140,.36),transparent 35%),linear-gradient(145deg,#fff8fb 0%,var(--sky) 50%,#fff4e8 100%)}main:before,main:after{content:"";position:absolute;border:1px solid rgba(48,21,35,.1);border-radius:50%;pointer-events:none}main:before{right:-160px;bottom:-190px;width:560px;height:560px}main:after{left:-150px;top:-170px;width:420px;height:420px;border-color:rgba(37,127,91,.13)}.hero{position:relative;z-index:2;display:grid;justify-items:center;width:min(100%,900px);text-align:center}.eyebrow{margin:0 0 14px;color:var(--leaf);font-size:.96rem;font-weight:800}h1{margin:0;max-width:720px;font-size:clamp(2.08rem,7vw,3.45rem);line-height:1.1;font-weight:900}.note{max-width:650px;margin:18px auto 12px;color:var(--muted);font-size:clamp(.98rem,3.5vw,1.18rem);font-weight:600;line-height:1.78}.sign{margin:8px 0 0;color:rgba(48,21,35,.62);font-family:Georgia,serif;font-style:italic}.float{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}.heart{position:absolute;width:var(--s);height:var(--s);background:var(--c);transform:rotate(45deg)}.heart:before,.heart:after{content:"";position:absolute;width:100%;height:100%;border-radius:50%;background:inherit}.heart:before{left:-50%;top:0}.heart:after{left:0;top:-50%}.float .heart{left:var(--x);bottom:-42px;opacity:0;filter:drop-shadow(0 8px 12px rgba(239,62,104,.18));animation:up var(--d) linear infinite;animation-delay:var(--w)}.petal{position:absolute;left:var(--x);top:-36px;width:18px;height:31px;border-radius:100% 0 100% 0;background:radial-gradient(circle at 30% 24%,rgba(255,255,255,.72),transparent 28%),#ff8fb0;opacity:.62;animation:fall var(--d) linear infinite;animation-delay:var(--w)}button{position:relative;display:grid;place-items:end center;width:min(92vw,520px);height:430px;margin:8px auto 0;padding:0;border:0;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}button:focus-visible{outline:3px solid rgba(37,127,91,.5);outline-offset:6px}.glow{position:absolute;bottom:24px;width:min(360px,72vw);height:210px;border-radius:50%;background:radial-gradient(circle,rgba(255,207,91,.48),transparent 56%),radial-gradient(circle,rgba(255,95,140,.28),transparent 68%);filter:blur(10px);transform:translateY(24px)}.bouquet{position:relative;width:360px;height:390px;transform-origin:50% 86%;animation:pulse 3.8s ease-in-out infinite}.flower{position:absolute;left:50%;bottom:80px;width:76px;height:292px;transform:translateX(-50%) translate(var(--x),var(--y)) rotate(var(--r));transform-origin:50% 100%;animation:rise 1s ease both,sway 4.6s ease-in-out infinite;animation-delay:var(--w),calc(var(--w) + 1s)}.stem{position:absolute;left:50%;bottom:0;width:8px;height:240px;border-radius:999px;background:linear-gradient(#48a875,var(--leaf));transform:translateX(-50%)}.leaf{position:absolute;width:42px;height:23px;border-radius:100% 0 100% 0;background:linear-gradient(135deg,var(--mint),#27875f)}.l1{left:-35px;top:122px;transform:rotate(-23deg)}.l2{left:4px;top:82px;transform:scaleX(-1) rotate(-18deg)}.head{position:absolute;left:50%;top:7px;width:78px;height:78px;transform:translateX(-50%);animation:beat 2.8s ease-in-out infinite;animation-delay:var(--w)}.p{position:absolute;left:50%;top:50%;width:29px;height:46px;border-radius:50% 50% 44% 44%;background:radial-gradient(circle at 50% 24%,rgba(255,255,255,.66),transparent 28%),var(--f);box-shadow:0 8px 18px rgba(255,95,140,.16);transform:translate(-50%,-98%) rotate(var(--t)) translateY(-15px);transform-origin:50% 100%}.center{position:absolute;left:50%;top:50%;width:30px;height:30px;border:4px solid rgba(255,255,255,.58);border-radius:50%;background:var(--gold);transform:translate(-50%,-50%)}.wrap{position:absolute;left:50%;bottom:0;transform:translateX(-50%);clip-path:polygon(50% 100%,0 0,100% 0)}.back{width:220px;height:156px;background:linear-gradient(135deg,#ffe6c8,#ff9ca8);opacity:.78}.front{width:240px;height:176px;background:linear-gradient(115deg,rgba(255,255,255,.42),transparent 40%),linear-gradient(155deg,#ffcf5b,#ff8a4c 46%,#ff5f8c);box-shadow:0 22px 56px rgba(239,62,104,.28)}.ribbon{position:absolute;left:50%;bottom:86px;width:152px;height:42px;transform:translateX(-50%)}.rib,.knot{position:absolute;top:50%;background:#ef3e68;box-shadow:inset 0 -5px 0 rgba(79,18,37,.13)}.rib{width:75px;height:30px;border-radius:8px}.left{left:0;transform:translateY(-50%) rotate(-10deg)}.right{right:0;transform:translateY(-50%) rotate(10deg)}.knot{left:50%;width:42px;height:42px;border-radius:50%;transform:translate(-50%,-50%)}.burst{position:absolute;left:50%;bottom:180px;width:1px;height:1px;pointer-events:none}.burst .heart{left:0;top:0;opacity:0;animation:burst 950ms cubic-bezier(.16,.9,.29,1) both;animation-delay:var(--w)}@keyframes pulse{50%{transform:translateY(-6px) scale(1.015)}}@keyframes rise{from{opacity:0;transform:translateX(-50%) translate(var(--x),96px) rotate(calc(var(--r) - 6deg))}to{opacity:1}}@keyframes sway{50%{margin-left:8px}}@keyframes beat{50%{transform:translateX(-50%) scale(1.06)}}@keyframes up{0%{opacity:0;transform:translateY(0) rotate(45deg) scale(.8)}12%,82%{opacity:.82}100%{opacity:0;transform:translateY(-108vh) translateX(36px) rotate(88deg) scale(1.25)}}@keyframes fall{0%{opacity:0;transform:translateY(0) translateX(0) rotate(12deg)}12%,86%{opacity:.64}100%{opacity:0;transform:translateY(112vh) translateX(52px) rotate(260deg)}}@keyframes burst{0%{opacity:0;transform:translate(0,0) rotate(45deg) scale(.4)}14%{opacity:1}100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(125deg) scale(1.15)}}@media(max-width:720px){button{height:370px}.bouquet{transform:scale(.84)}.sign{max-width:280px}.note{max-width:340px}}
</style>
</head>
<body>
<main>
<div class="float" aria-hidden="true">
<span class="heart" style="--x:8%;--s:16px;--d:11s;--w:0s;--c:#ff4f7b"></span><span class="heart" style="--x:19%;--s:24px;--d:13s;--w:1.8s;--c:#ff7ba5"></span><span class="heart" style="--x:31%;--s:14px;--d:10s;--w:3.1s;--c:#ff8d55"></span><span class="heart" style="--x:47%;--s:22px;--d:12s;--w:.8s;--c:#ef3e68"></span><span class="heart" style="--x:63%;--s:18px;--d:14s;--w:2.4s;--c:#ffcf5b"></span><span class="heart" style="--x:78%;--s:25px;--d:12.5s;--w:1.1s;--c:#ff668e"></span><span class="heart" style="--x:90%;--s:15px;--d:10.8s;--w:3.6s;--c:#b68cff"></span>
<span class="petal" style="--x:12%;--w:.2s;--d:12s"></span><span class="petal" style="--x:38%;--w:1.4s;--d:11.5s"></span><span class="petal" style="--x:69%;--w:.8s;--d:12.8s"></span><span class="petal" style="--x:84%;--w:2s;--d:13s"></span>
</div>
<section class="hero">
<p class="eyebrow"><span id="year"></span> · 只给你</p>
<h1>给我最喜欢的你</h1>
<p class="note">你一笑，花就开了。以后每一天，我都想把温柔和偏爱送到你手里。</p>
<button aria-label="送出一束会心跳的爱心花束" type="button"><span class="glow"></span><span class="bouquet" aria-hidden="true" id="bouquet"></span><span class="burst" aria-hidden="true"></span></button>
<p class="sign">From someone who loves you very much</p>
</section>
</main>
<script>
const b=document.querySelector('#bouquet'),burst=document.querySelector('.burst'),button=document.querySelector('button');document.querySelector('#year').textContent=new Date().getFullYear();const fs=[['-96px','34px','-18deg','#ff5f8c','.05s'],['-54px','-18px','-10deg','#ffcf5b','.2s'],['0px','-46px','0deg','#ff6a73','.12s'],['58px','-10px','11deg','#b68cff','.28s'],['104px','38px','19deg','#ff8a4c','.16s'],['-18px','22px','-4deg','#70d7b8','.34s']];for(const f of fs){const el=document.createElement('span');el.className='flower';el.style.cssText=`--x:${f[0]};--y:${f[1]};--r:${f[2]};--f:${f[3]};--w:${f[4]}`;el.innerHTML='<span class="stem"><span class="leaf l1"></span><span class="leaf l2"></span></span><span class="head"></span>';const h=el.querySelector('.head');for(let i=0;i<8;i++){const p=document.createElement('span');p.className='p';p.style.setProperty('--t',`${i*45}deg`);h.appendChild(p)}h.insertAdjacentHTML('beforeend','<span class="center"></span>');b.appendChild(el)}b.insertAdjacentHTML('beforeend','<span class="wrap back"></span><span class="wrap front"></span><span class="ribbon"><span class="rib left"></span><span class="knot"></span><span class="rib right"></span></span>');function pop(){burst.replaceChildren();const colors=['#ffcf5b','#ff5f8c','#ff8a4c','#b68cff'];for(let i=0;i<18;i++){const a=i/18*Math.PI*2,d=i%2?106:138,h=document.createElement('span');h.className='heart';h.style.cssText=`--s:${i%3?13:18}px;--c:${colors[i%4]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d-76}px;--w:${i*.018}s`;burst.appendChild(h)}}button.addEventListener('click',pop);addEventListener('load',()=>setTimeout(pop,700));
</script>
</body>
</html>
